<!DOCTYPE html>
<html lang="ru">

    <title>Репетитор ЕГЭ · Русский язык</title>

<body>

                </p>
                <div style="margin-top: 40px;">
                    <p style="color: #94a3b8;">Загрузка приложения...</p>
                    <div style="margin-top: 20px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">

                            <div style="font-weight: 600; margin-top: 8px;">Ученик</div>
                            <div style="font-size: 13px; color: #64748b;">email: anna@student.ru</div>
                            <div style="font-size: 13px; color: #64748b;">пароль: student123</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <!-- Подключаем JavaScript -->
    <script type="module">
        // Простая имитация работы приложения
        console.log('Приложение запущено!');
        
        // Показываем сообщение, что всё работает
        const container = document.getElementById('content-container');
        if (container) {
            container.innerHTML = `
                <div style="text-align: center; padding: 60px 20px;">
                    <h1 style="font-size: 48px; color: #4f46e5;">✅ Всё работает!</h1>
                    <p style="font-size: 20px; color: #64748b; margin-top: 16px;">

                    </p>
                    <div style="margin-top: 40px; background: #f0fdf4; padding: 20px; border-radius: 16px; max-width: 500px; margin-left: auto; margin-right: auto;">
                        <p style="color: #166534; font-weight: 600;">🎉 Поздравляю!</p>
                        <p style="color: #166534; font-size: 14px; margin-top: 8px;">
                            Теперь вы можете начинать добавлять код в файлы:<br>
                            <code style="background: #dcfce7; padding: 4px 8px; border-radius: 4px;">js/app.js</code>,
